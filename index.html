<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - World Class News</title>
    <meta name="description" content="Latest news, breaking stories, and in-depth analysis from around the world">
    <meta name="keywords" content="news, breaking news, world news,India news">
    <meta name="author" content="THE MOON">
    <meta property="og:title" content="THE MOON - World Class News">
    <meta property="og:description" content="Latest news and breaking stories">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #e0e0e0;
            --card: #f5f5f5;
            --accent: #c00000;
        }
        
        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-secondary: #aaa;
            --border: #2a2a2a;
            --card: #141414;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(var(--bg-rgb), 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        
        /* Nav */
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }
        
        /* Main */
        .main {
            max-width: 1400px;
            margin: 80px auto 0;
            padding: 2rem;
        }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--accent), #ff4444);
            border-radius: 24px;
            padding: 3rem;
            margin-bottom: 3rem;
            color: white;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        /* News Grid */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .news-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .news-content {
            padding: 1.5rem;
        }
        
        .news-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--accent);
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .news-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }
        
        .news-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        
        .news-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        /* Loader */
        .loader {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: var(--bg);
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 1001;
            transition: right 0.3s;
            overflow-y: auto;
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .header-content {
                padding: 1rem;
            }
            
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">🌙 THE MOON</a>
            <div class="nav-links">
                <a href="#" data-category="all">Home</a>
                <a href="#" data-category="tech">Tech</a>
                <a href="#" data-category="sports">Sports</a>
                <a href="#" data-category="business">Business</a>
                <a href="#" data-category="politics">Politics</a>
                <a href="#" data-category="study">Study</a>
            </div>
            <div>
                <button id="themeToggle" style="background: none; border: none; font-size: 1.25rem; cursor: pointer;">🌙</button>
                <button id="menuToggle" style="background: none; border: none; font-size: 1.25rem; cursor: pointer;">☰</button>
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="hero">
            <h1>Welcome to THE MOON</h1>
            <p>Your trusted source for world-class news, AI-powered insights, and real-time updates</p>
        </div>
        
        <div class="news-grid" id="newsGrid">
            <div class="loader"><div class="spinner"></div></div>
        </div>
    </main>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button id="closeSidebar" style="background: none; border: none; font-size: 1.5rem; cursor:pointer;">×</button>
        </div>
        <div style="padding: 1.5rem;">
            <div style="margin-bottom: 1.5rem;">
                <input type="text" id="searchInput" placeholder="Search news..." style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text);">
            </div>
            <div id="searchResults"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://the-moon-api.yourusername.workers.dev'
        
        let currentCategory = 'all'
        let currentPage = 1
        let isLoading = false
        
        async function loadNews(page = 1, category = 'all') {
            const grid = document.getElementById('newsGrid')
            if (page === 1) {
                grid.innerHTML = '<div class="loader"><div class="spinner"></div></div>'
            }
            
            let url = `${API_URL}/api/news?page=${page}&limit=12`
            if (category !== 'all') {
                url += `&category=${category}`
            }
            
            try {
                const response = await fetch(url)
                const { data, pagination } = await response.json()
                
                if (page === 1) {
                    grid.innerHTML = ''
                }
                
                data.forEach(news => {
                    const card = document.createElement('div')
                    card.className = 'news-card'
                    card.onclick = () => window.open(`/news/${news.slug}`, '_blank')
                    card.innerHTML = `
                        ${news.featured_image ? `<img class="news-image" src="${news.featured_image}" alt="${news.title}" loading="lazy">` : ''}
                        <div class="news-content">
                            <span class="news-category">${news.categories?.name || 'News'}</span>
                            <h2 class="news-title">${news.title}</h2>
                            <p class="news-excerpt">${news.excerpt || news.content.substring(0, 120)}...</p>
                            <div class="news-meta">
                                <span>📅 ${new Date(news.published_at).toLocaleDateString()}</span>
                                <span>👁️ ${news.views?.toLocaleString() || 0} views</span>
                                <span>💬 ${news.comments?.length || 0} comments</span>
                            </div>
                        </div>
                    `
                    grid.appendChild(card)
                })
                
                if (pagination.page < Math.ceil(pagination.total / pagination.limit)) {
                    const loadMore = document.createElement('button')
                    loadMore.textContent = 'Load More'
                    loadMore.style.cssText = 'width: 100%; padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; margin-top: 2rem;'
                    loadMore.onclick = () => loadNews(currentPage + 1, currentCategory)
                    grid.appendChild(loadMore)
                }
                
                currentPage = page
            } catch (error) {
                console.error('Error loading news:', error)
                grid.innerHTML = '<p style="text-align:center; padding:3rem;">Error loading news. Please try again later.</p>'
            }
        }
        
        // Category filter
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault()
                currentCategory = link.getAttribute('data-category')
                currentPage = 1
                loadNews(1, currentCategory)
            })
        })
        
        // Search
        let searchTimeout
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            clearTimeout(searchTimeout)
            const query = e.target.value
            const resultsDiv = document.getElementById('searchResults')
            
            if (query.length < 2) {
                resultsDiv.innerHTML = ''
                return
            }
            
            searchTimeout = setTimeout(async () => {
                const response = await fetch(`${API_URL}/api/search?q=${encodeURIComponent(query)}`)
                const results = await response.json()
                
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<p>No results found</p>'
                } else {
                    resultsDiv.innerHTML = results.map(news => `
                        <div style="padding: 0.75rem; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="window.open('/news/${news.slug}', '_blank')">
                            <div style="font-weight: 500;">${news.title}</div>
                            <small style="color: var(--text-secondary);">${news.categories?.name}</small>
                        </div>
                    `).join('')
                }
            }, 300)
        })
        
        // Sidebar
        const sidebar = document.getElementById('sidebar')
        document.getElementById('menuToggle').onclick = () => sidebar.classList.add('open')
        document.getElementById('closeSidebar').onclick = () => sidebar.classList.remove('open')
        
        // Dark mode
        const themeToggle = document.getElementById('themeToggle')
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark')
            themeToggle.textContent = '☀️'
        }
        themeToggle.onclick = () => {
            const isDark = document.body.hasAttribute('data-theme')
            if (isDark) {
                document.body.removeAttribute('data-theme')
                themeToggle.textContent = '🌙'
                localStorage.setItem('theme', 'light')
            } else {
                document.body.setAttribute('data-theme', 'dark')
                themeToggle.textContent = '☀️'
                localStorage.setItem('theme', 'dark')
            }
        }
        
        // Load initial news
        loadNews()
    </script>
</body>
</html>
