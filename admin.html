<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin Panel</title>
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #fff; }
        .container { max-width: 800px; margin: 2rem auto; padding: 2rem; background: #111; border-radius: 16px; }
        h1 { margin-bottom: 1.5rem; color: #c00000; }
        input, textarea, select {
            width: 100%; padding: 0.75rem; margin-bottom: 1rem;
            background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
            color: #fff; font-size: 1rem;
        }
        button { background: #c00000; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .success { background: #28a745; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .error { background: #dc3545; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 THE MOON - Admin Panel</h1>
        
        <div id="loginSection">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <p style="margin-top:1rem;">Demo: admin@themoon.com / any password (signup first)</p>
        </div>

        <div id="newsSection" style="display:none;">
            <h2>Create News</h2>
            <input type="text" id="title" placeholder="Title">
            <select id="category">
                <option value="tech">Technology</option>
                <option value="sports">Sports</option>
                <option value="business">Business</option>
                <option value="politics">Politics</option>
                <option value="study">Study</option>
            </select>
            <input type="text" id="image" placeholder="Image URL (optional)">
            <textarea id="content" rows="10" placeholder="News content..."></textarea>
            <button onclick="publishNews()">Publish News</button>
            <div id="message"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cjyfmhsodmbudjbxjbek.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RPIMDVsM_8kpbqSlTUmnVw_m7k7K4Cv';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // First try to sign up
            let { error } = await supabase.auth.signUp({ email, password });
            if (error && !error.message.includes('already registered')) {
                document.getElementById('message').innerHTML = `<div class="error">Signup error: ${error.message}</div>`;
                return;
            }
            
            // Then sign in
            const { data, error: signInError } = await supabase.auth.signInWithPassword({ email, password });
            if (signInError) {
                document.getElementById('message').innerHTML = `<div class="error">Login error: ${signInError.message}</div>`;
                return;
            }
            
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('newsSection').style.display = 'block';
            document.getElementById('message').innerHTML = '<div class="success">✅ Logged in!</div>';
        }

        async function publishNews() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value;
            const image = document.getElementById('image').value;
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            
            const { data: user } = await supabase.auth.getUser();
            
            const { error } = await supabase.from('news').insert({
                title: title,
                slug: slug,
                content: content,
                category_id: getCategoryId(category),
                featured_image: image,
                status: 'published',
                published_at: new Date(),
                excerpt: content.substring(0, 150)
            });
            
            if (error) {
                document.getElementById('message').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            } else {
                document.getElementById('message').innerHTML = '<div class="success">✅ News published! It will appear on website in 2 minutes.</div>';
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('image').value = '';
            }
        }
        
        function getCategoryId(slug) {
            const map = { tech: 1, sports: 2, business: 3, politics: 4, study: 5 };
            return map[slug] || 1;
        }
        
        // Check if already logged in
        supabase.auth.getSession().then(({ data }) => {
            if (data.session) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('newsSection').style.display = 'block';
            }
        });
    </script>
</body>
</html>
