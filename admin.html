<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Professional Admin Dashboard</title>
    <script src="https://cdn.tiny.cloud/1/YOUR_API_KEY/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #111;
            border-right: 1px solid #222;
            padding: 2rem 1rem;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c00000, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding: 0 1rem;
            margin-bottom: 2rem;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #aaa;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: #1a1a1a;
            color: #fff;
        }
        
        /* Main Content */
        .main {
            margin-left: 260px;
            padding: 2rem;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        
        /* Forms */
        .form-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
        }
        
        button {
            background: #c00000;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #ff0000;
            transform: translateY(-2px);
        }
        
        /* Image preview */
        .image-preview {
            max-width: 200px;
            margin-top: 1rem;
            border-radius: 8px;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🌙 THE MOON</div>
        <nav>
            <a href="#" class="nav-item active" data-page="dashboard">
                <span>📊</span> Dashboard
            </a>
            <a href="#" class="nav-item" data-page="news">
                <span>📰</span> All News
            </a>
            <a href="#" class="nav-item" data-page="create">
                <span>✍️</span> Create News
            </a>
            <a href="#" class="nav-item" data-page="categories">
                <span>📁</span> Categories
            </a>
            <a href="#" class="nav-item" data-page="comments">
                <span>💬</span> Comments
            </a>
            <a href="#" class="nav-item" data-page="users">
                <span>👥</span> Users
            </a>
            <a href="#" class="nav-item" data-page="settings">
                <span>⚙️</span> Settings
            </a>
        </nav>
    </div>
    
    <div class="main" id="mainContent">
        <!-- Dynamic content loads here -->
    </div>
    
    <div id="toast" style="display: none;"></div>
    
    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'
        const API_URL = 'https://the-moon-api.yourusername.workers.dev'
        
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        
        let currentUser = null
        
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser()
            if (!user) {
                // Show login screen
                showLogin()
                return false
            }
            currentUser = user
            return true
        }
        
        function showLogin() {
            document.getElementById('mainContent').innerHTML = `
                <div style="max-width: 400px; margin: 4rem auto;">
                    <div class="form-card">
                        <h2 style="margin-bottom: 1.5rem;">Admin Login</h2>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="admin@themoon.news">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" placeholder="••••••••">
                        </div>
                        <button onclick="login()">Login</button>
                    </div>
                </div>
            `
        }
        
        async function login() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            
            const { error } = await supabase.auth.signInWithPassword({ email, password })
            
            if (error) {
                showToast('Login failed: ' + error.message, 'error')
            } else {
                showToast('Login successful!', 'success')
                loadPage('dashboard')
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.style.backgroundColor = type === 'success' ? '#28a745' : '#dc3545'
            toast.style.display = 'block'
            setTimeout(() => {
                toast.style.display = 'none'
            }, 3000)
        }
        
        async function loadPage(page) {
            const content = document.getElementById('mainContent')
            
            if (page === 'dashboard') {
                const stats = await fetch(`${API_URL}/api/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}` }
                }).then(res => res.json())
                
                content.innerHTML = `
                    <h1 style="margin-bottom: 2rem;">Dashboard</h1>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div>📰 Total News</div>
                            <div class="stat-value">${stats.total_news || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div>👁️ Total Views</div>
                            <div class="stat-value">${stats.total_views?.toLocaleString() || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div>💬 Comments</div>
                            <div class="stat-value">${stats.total_comments || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div>👥 Users</div>
                            <div class="stat-value">${stats.total_users || 0}</div>
                        </div>
                    </div>
                `
            } else if (page === 'create') {
                // Load categories
                const categories = await fetch(`${API_URL}/api/categories`).then(res => res.json())
                
                content.innerHTML = `
                    <h1 style="margin-bottom: 2rem;">Create News</h1>
                    <div class="form-card">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="title" placeholder="Enter news title...">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="category">
                                ${categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Featured Image</label>
                            <input type="file" id="image" accept="image/*">
                            <img id="preview" class="image-preview" style="display: none;">
                        </div>
                        <div class="form-group">
                            <label>Excerpt (Short description)</label>
                            <textarea id="excerpt" rows="3" placeholder="Brief summary..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Content</label>
                            <textarea id="content" rows="15" placeholder="Write your news here..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Tags (comma separated)</label>
                            <input type="text" id="tags" placeholder="ipl, cricket, sports">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="status">
                                <option value="draft">Draft</option>
                                <option value="published">Publish Now</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="featured"> Feature this news
                            </label>
                        </div>
                        <button onclick="publishNews()">📰 Publish News</button>
                    </div>
                `
                
                // Initialize TinyMCE
                tinymce.init({
                    selector: '#content',
                    height: 500,
                    menubar: true,
                    plugins: 'anchor autolink charmap codesample emoticons image link lists media searchreplace table visualblocks wordcount',
                    toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link image media table | align lineheight | numlist bullist indent outdent | emoticons charmap | removeformat',
                    image_title: true,
                    automatic_uploads: true,
                    file_picker_types: 'image',
                    images_upload_url: `${API_URL}/api/admin/upload`,
                    images_upload_handler: async (blobInfo, progress) => {
                        const formData = new FormData()
                        formData.append('image', blobInfo.blob(), blobInfo.filename())
                        
                        const response = await fetch(`${API_URL}/api/admin/upload`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}` },
                            body: formData
                        })
                        
                        const data = await response.json()
                        return data.url
                    }
                })
                
                // Image preview
                document.getElementById('image').addEventListener('change', async (e) => {
                    const file = e.target.files[0]
                    if (!file) return
                    
                    const reader = new FileReader()
                    reader.onload = (e) => {
                        const preview = document.getElementById('preview')
                        preview.src = e.target.result
                        preview.style.display = 'block'
                    }
                    reader.readAsDataURL(file)
                    
                    const formData = new FormData()
                    formData.append('image', file)
                    
                    const response = await fetch(`${API_URL}/api/admin/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}` },
                        body: formData
                    })
                    
                    const data = await response.json()
                    window.uploadedImageUrl = data.url
                })
            }
        }
        
        async function publishNews() {
            const newsData = {
                title: document.getElementById('title').value,
                category_id: parseInt(document.getElementById('category').value),
                excerpt: document.getElementById('excerpt').value,
                content: tinymce.get('content').getContent(),
                featured_image: window.uploadedImageUrl || null,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()),
                is_featured: document.getElementById('featured').checked,
                status: document.getElementById('status').value
            }
            
            const response = await fetch(`${API_URL}/api/admin/news`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${(await supabase.auth.getSession()).data.session?.access_token}`
                },
                body: JSON.stringify(newsData)
            })
            
            if (response.ok) {
                showToast('News published successfully!')
                setTimeout(() => loadPage('create'), 2000)
            } else {
                const error = await response.json()
                showToast('Error: ' + error.error, 'error')
            }
        }
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault()
                const page = item.getAttribute('data-page')
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'))
                item.classList.add('active')
                loadPage(page)
            })
        })
        
        // Initialize
        checkAuth().then(authenticated => {
            if (authenticated) loadPage('dashboard')
        })
    </script>
</body>
</html>
